services:
  db:
    image: mysql:8.0 #lolipop の最新
    environment: #環境変数の設定
      MYSQL_DATABASE: llpp_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root_password #Mysqlはroot_passwordも必須
    ports:
      - "3306:3306" #Mysqlのデフォルトポートは3306
    volumes:
      - mysql_data:/var/lib/mysql #Mysqlのデータディレクトリ。volumesでデータの永続を指定
  back:
    build:
      context: ./backend #Dockerファイルがあるディレクトリパスを指定
      dockerfile: Dockerfile
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -b '0.0.0.0'" #コンテナが起動するときに実行されるコマンドを指定
    volumes:
      - ./backend:/app
    ports:
      - "3003:3000"
    depends_on: #db→Railsの順に起動するように設定
      - db
    tty: true
    stdin_open: true
    environment:
      - RAILS_ENV=development
      - CORS_ALLOWED_ORIGINS=localhost:8000,127.0.0.1:8000
    networks:
      default:
        aliases:
          - api  # backサービスに「api」という別名を追加
  front:
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: yarn dev -p 4000
    ports:
      - "8000:4000"
    environment:
      - API_URL=http://api:3000
    depends_on:
      - back
    networks:
      - default
volumes:
  mysql_data:
